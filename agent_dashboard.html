<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CallNowService — AIOS Control Board</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,system-ui,sans-serif;background:#0f1117;color:#e1e4e8;padding:24px}
  h1{font-size:20px;margin-bottom:4px}
  .sub{color:#8b949e;font-size:12px;margin-bottom:24px}
  .stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 16px;min-width:100px;text-align:center}
  .stat .num{font-size:24px;font-weight:700}
  .stat .label{font-size:10px;color:#8b949e;text-transform:uppercase}
  .flow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:20px;padding:16px;background:#161b22;border:1px solid #30363d;border-radius:10px;overflow-x:auto}
  .flow-step{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 14px;text-align:center;min-width:90px}
  .flow-step .icon{font-size:20px}
  .flow-step .name{font-size:10px;font-weight:700;margin-top:2px}
  .flow-step .count{font-size:18px;font-weight:700;color:#58a6ff;margin-top:2px}
  .flow-step .count.green{color:#3fb950}
  .flow-step .count.orange{color:#d2991d}
  .flow-step .count.red{color:#f85149}
  .flow-arrow{color:#30363d;font-size:18px;font-weight:700}
  .flow-arrow.active{color:#58a6ff}
  h2{font-size:15px;margin-bottom:12px;margin-top:24px}
  .agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .agent-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}
  .agent-card .top{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
  .agent-card h3{font-size:14px}
  .badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700}
  .badge.on{background:rgba(63,185,80,0.15);color:#3fb950}
  .badge.wait{background:rgba(88,166,255,0.15);color:#58a6ff}
  .agent-card .desc{font-size:11px;color:#8b949e;margin-bottom:8px}
  .agent-card .sched{font-size:11px;color:#8b949e}
  .agent-card .edit{font-size:10px;color:#d2991d;margin-top:8px;font-style:italic}
  .recent{font-size:11px;color:#8b949e;margin-top:24px;padding:12px;background:#161b22;border:1px solid #30363d;border-radius:8px}
  .recent div{margin-bottom:3px}
</style>
</head>
<body>

<h1>CallNowService — Agent Control Board</h1>
<div class="sub" id="updated">Loading providers.json...</div>

<div class="stats" id="stats"></div>

<h2>Pipeline Flow</h2>
<div class="flow">
  <div class="flow-step"><div class="icon">🔍</div><div class="name">RESEARCH</div><div class="count" id="cnt-searching">—</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="icon">✉️</div><div class="name">OUTREACH</div><div class="count orange" id="cnt-found">—</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="icon">📥</div><div class="name">INTAKE</div><div class="count orange" id="cnt-contacted">—</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="icon">🤝</div><div class="name">ONBOARD</div><div class="count orange" id="cnt-onboarding">—</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="icon">💰</div><div class="name">PAYMENT</div><div class="count orange" id="cnt-paid">—</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="icon">👁️</div><div class="name">ACTIVE</div><div class="count green" id="cnt-active">—</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="icon">📊</div><div class="name">MONITOR</div><div class="count" id="cnt-revenue">—</div></div>
</div>

<h2>Agents</h2>
<div class="agent-grid" id="agents"></div>

<div class="recent" id="recent"></div>

<script>
fetch('providers.json').then(r=>r.json()).then(DATA=>{
  var m = DATA._meta||{};
  document.getElementById('updated').textContent = 'Data source: providers.json — Updated: '+(m.updated||'never');

  // Count all vendor statuses
  var st={};
  for(var ck in DATA){if(ck.startsWith('_'))continue;var c=DATA[ck];
    for(var sk in c){if(sk.startsWith('_'))continue;var vendors=c[sk];
      if(Array.isArray(vendors)) vendors.forEach(function(v){st[v.status]=(st[v.status]||0)+1;});
    }
  }

  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="num">'+(st.searching||0)+'</div><div class="label">Searching</div></div>'+
    '<div class="stat"><div class="num">'+(st.found||0)+'</div><div class="label">Found</div></div>'+
    '<div class="stat"><div class="num">'+(st.contacted||0)+'</div><div class="label">Contacted</div></div>'+
    '<div class="stat"><div class="num">'+(st.active||0)+'</div><div class="label" style="color:#3fb950">Active</div></div>'+
    '<div class="stat"><div class="num">'+(st.rejected||0)+'</div><div class="label" style="color:#f85149">Rejected</div></div>'+
    '<div class="stat"><div class="num">$'+(m.revenue_month||0)+'</div><div class="label" style="color:#3fb950">Rev/Mo</div></div>';

  document.getElementById('cnt-searching').textContent = st.searching||0;
  document.getElementById('cnt-found').textContent = st.found||0;
  document.getElementById('cnt-contacted').textContent = st.contacted||0;
  document.getElementById('cnt-onboarding').textContent = (st.intake||0)+(st.onboarding||0);
  document.getElementById('cnt-paid').textContent = st.paid||0;
  document.getElementById('cnt-active').textContent = st.active||0;
  document.getElementById('cnt-revenue').textContent = '$'+(m.revenue_month||0);

  var agents = [
    {icon:"🔍",name:"Research Agent",desc:"Finds providers via Google, fills vendor slots",sched:"Mon 8am",skill:"callnow-research"},
    {icon:"✉️",name:"Outreach Agent",desc:"Sends cold emails to found providers",sched:"Mon 10am",skill:"callnow-outreach"},
    {icon:"📥",name:"Intake Agent",desc:"Reads provider reply emails, extracts details",sched:"Every hour",skill:"callnow-intake"},
    {icon:"🤝",name:"Onboarding Agent",desc:"Sends pricing + payment link",sched:"Every hour",skill:"callnow-onboarding"},
    {icon:"💰",name:"Payment Agent",desc:"Confirms payments, marks paid",sched:"Daily 9am",skill:"callnow-payment"},
    {icon:"👁️",name:"Supervisor Agent",desc:"Activates listings, checks pipeline health",sched:"Daily 10am",skill:"callnow-supervisor"},
    {icon:"📊",name:"Monitor Agent",desc:"Tracks leads, uptime, monthly invoices",sched:"Daily 7am",skill:"callnow-monitor"}
  ];

  var ah='';
  agents.forEach(function(a){
    ah+='<div class="agent-card">';
    ah+='<div class="top"><h3>'+a.icon+' '+a.name+'</h3><span class="badge wait">SCHEDULED</span></div>';
    ah+='<div class="desc">'+a.desc+'</div>';
    ah+='<div class="sched">Schedule: '+a.sched+'</div>';
    ah+='<div class="edit">To edit: skills/callnow/'+a.skill+'/SKILL.md</div>';
    ah+='</div>';
  });
  document.getElementById('agents').innerHTML=ah;

  // Recent activity from actual data
  var foundCount = st.found||0;
  var activeCount = st.active||0;
  document.getElementById('recent').innerHTML =
    '<strong>Recent Activity</strong><br>'+
    (foundCount > 0 ? '<div>🔍 Research Agent found <b>'+foundCount+' providers</b> — ready for outreach</div>' : '<div>🔍 No providers found yet — Research Agent runs Monday</div>')+
    (activeCount > 0 ? '<div>✅ <b>'+activeCount+' active providers</b> receiving leads</div>' : '<div>💰 No active providers yet — payment not configured</div>')+
    '<div style="margin-top:8px;color:#8b949e">Next agent run: Monitor Agent tomorrow 7am</div>';
}).catch(function(){
  document.getElementById('updated').textContent = 'Cannot load providers.json — start local server';
});
</script>

</body>
</html>
