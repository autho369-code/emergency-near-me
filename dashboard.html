<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmergencyNearMe — Supervisor Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,system-ui,sans-serif;background:#0f1117;color:#e1e4e8;padding:20px}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .header h1{font-size:22px;font-weight:700}
  .stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .stat{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px 20px;min-width:120px}
  .stat .num{font-size:28px;font-weight:700}
  .stat .label{font-size:11px;color:#8b949e;text-transform:uppercase;margin-top:4px}
  .stat .num.green{color:#3fb950}
  .stat .num.yellow{color:#d2991d}
  .stat .num.red{color:#f85149}
  .stat .num.blue{color:#58a6ff}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .filters select,.filters input,.filters button{background:#161b22;border:1px solid #30363d;color:#e1e4e8;padding:8px 12px;border-radius:6px;font-size:13px}
  .filters button{background:#238636;border-color:#238636;cursor:pointer;font-weight:600}
  .filters button:hover{background:#2ea043}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:10px 12px;background:#161b22;border-bottom:1px solid #30363d;color:#8b949e;font-weight:600;font-size:12px;text-transform:uppercase;position:sticky;top:0;z-index:1}
  td{padding:8px 12px;border-bottom:1px solid #21262d}
  tr:hover td{background:rgba(255,255,255,0.03)}
  .status{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
  .status.searching{background:rgba(88,166,255,0.15);color:#58a6ff}
  .status.contacted{background:rgba(210,153,29,0.15);color:#d2991d}
  .status.negotiating{background:rgba(188,140,255,0.15);color:#bc8cff}
  .status.active{background:rgba(63,185,80,0.15);color:#3fb950}
  .status.rejected{background:rgba(248,81,73,0.15);color:#f85149}
  .phone{color:#58a6ff;text-decoration:none}
  .phone:hover{text-decoration:underline}
  .summary-bar{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 20px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap;font-size:13px}
  .summary-bar span{color:#8b949e}
  .summary-bar b{color:#e1e4e8}
  @media(max-width:768px){table{font-size:11px}td,th{padding:6px 8px}}
</style>
</head>
<body>

<div class="header">
  <h1>🔧 EmergencyNearMe — Supervisor Dashboard</h1>
  <span style="color:#8b949e;font-size:12px" id="updated"></span>
</div>

<div class="stats" id="stats"></div>

<div class="summary-bar" id="summary"></div>

<div class="summary-bar" id="agent-bar" style="background:#0d1117;border-color:#238636">
  <span>🤖 <b>Agent Status</b></span>
  <span id="agent-status">Loading...</span>
</div>

<div class="filters">
  <select id="filterCity"><option value="">All Cities</option></select>
  <select id="filterService"><option value="">All Services</option></select>
  <select id="filterStatus"><option value="">All Statuses</option><option value="searching">Searching</option><option value="contacted">Contacted</option><option value="negotiating">Negotiating</option><option value="active">Active</option><option value="rejected">Rejected</option></select>
  <input type="text" id="filterSearch" placeholder="Search provider name..." style="min-width:180px">
  <button onclick="render()">Filter</button>
  <button onclick="resetFilters()" style="background:#30363d;border-color:#30363d">Reset</button>
</div>

<table>
  <thead>
    <tr>
      <th>City</th>
      <th>Service</th>
      <th>Status</th>
      <th>Provider</th>
      <th>Phone</th>
      <th>Leads/Mo</th>
      <th>Rate</th>
      <th>Revenue</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
let DATA = null;
let ICONS = {plumber:'🔧',electrician:'⚡',locksmith:'🔐',hvac:'❄️',roofer:'🏠',mechanic:'🚗',appliance:'🔌','pest-control':'🐀','water-damage':'💧'};

fetch('providers.json')
  .then(r=>r.json())
  .then(d=>{DATA=d;initFilters();render();});

function initFilters() {
  let cities = '<option value="">All Cities</option>';
  let services = '<option value="">All Services</option>';
  let seenCities = new Set();
  let seenServices = new Set();

  for (let k in DATA) {
    if (k.startsWith('_')) continue;
    let c = DATA[k];
    seenCities.add(c._name);
    for (let sk in c) {
      if (sk.startsWith('_')) continue;
      seenServices.add(sk);
    }
  }
  [...seenCities].sort().forEach(c => cities += `<option value="${c}">${c}</option>`);
  [...seenServices].sort().forEach(s => services += `<option value="${s}">${ICONS[s]||''} ${s}</option>`);

  document.getElementById('filterCity').innerHTML = cities;
  document.getElementById('filterService').innerHTML = services;
}

function render() {
  let cityF = document.getElementById('filterCity').value;
  let svcF = document.getElementById('filterService').value;
  let statusF = document.getElementById('filterStatus').value;
  let searchF = document.getElementById('filterSearch').value.toLowerCase();

  let rows = [];
  let stats = {searching:0,contacted:0,negotiating:0,active:0,rejected:0,leads:0,revenue:0};

  for (let ck in DATA) {
    if (ck.startsWith('_')) continue;
    let c = DATA[ck];
    if (cityF && c._name !== cityF) continue;
    for (let sk in c) {
      if (sk.startsWith('_')) continue;
      let p = c[sk];
      if (svcF && sk !== svcF) continue;
      if (statusF && p.status !== statusF) continue;
      if (searchF && p.provider_name && !p.provider_name.toLowerCase().includes(searchF)) continue;

      stats[p.status] = (stats[p.status]||0) + 1;
      stats.leads += p.leads_month||0;
      stats.revenue += (p.leads_month||0) * (p.rate||0);

      let statusClass = p.status||'searching';
      rows.push({city:c._name,state:c._state,service:sk,serviceIcon:ICONS[sk]||'',provider:p,statusClass:statusClass});
    }
  }

  // Stats cards
  document.getElementById('stats').innerHTML =
    `<div class="stat"><div class="num blue">${stats.searching||0}</div><div class="label">Searching</div></div>` +
    `<div class="stat"><div class="num yellow">${stats.contacted||0}</div><div class="label">Contacted</div></div>` +
    `<div class="stat"><div class="num" style="color:#bc8cff">${stats.negotiating||0}</div><div class="label">Negotiating</div></div>` +
    `<div class="stat"><div class="num green">${stats.active||0}</div><div class="label">Active</div></div>` +
    `<div class="stat"><div class="num red">${stats.rejected||0}</div><div class="label">Rejected</div></div>` +
    `<div class="stat"><div class="num">${stats.leads}</div><div class="label">Leads/Mo</div></div>` +
    `<div class="stat"><div class="num green">$${stats.revenue.toLocaleString()}</div><div class="label">Rev/Mo</div></div>`;

  document.getElementById('summary').innerHTML =
    `<span>Showing <b>${rows.length}</b> of <b>${DATA._meta?.total_slots||0}</b> slots</span>` +
    `<span>Active: <b style="color:#3fb950">${stats.active||0}</b></span>` +
    `<span>Monthly revenue: <b style="color:#3fb950">$${stats.revenue.toLocaleString()}</b></span>`;

  // Agent status from real data
  let agentHtml = '';
  if (DATA._meta) {
    let m = DATA._meta;
    agentHtml += `<span>🔍 Found: <b>${m.contacted||0} providers</b></span>`;
    agentHtml += `<span>✅ Active: <b style="color:#3fb950">${m.active||0}</b></span>`;
    agentHtml += `<span>🔎 Searching: <b>${m.searching||0} slots</b></span>`;
    agentHtml += `<span>📅 Updated: <b>${(m.updated||'').slice(0,10)}</b></span>`;
    agentHtml += `<span>💰 Revenue: <b style="color:#3fb950">$${(m.revenue_month||0).toLocaleString()}</b></span>`;
  }
  document.getElementById('agent-status').innerHTML = agentHtml;

  // Table
  let html = '';
  rows.forEach(r=>{
    html += `<tr>
      <td>${r.city}, ${r.state}</td>
      <td>${r.serviceIcon} ${r.service}</td>
      <td><span class="status ${r.statusClass}">${r.provider.status}</span></td>
      <td><strong>${r.provider.provider_name||'—'}</strong></td>
      <td><a href="tel:${r.provider.provider_phone}" class="phone">${r.provider.provider_phone||'—'}</a></td>
      <td>${r.provider.leads_month||0}</td>
      <td>$${r.provider.rate||0}</td>
      <td>$${((r.provider.leads_month||0)*(r.provider.rate||0)).toLocaleString()}</td>
    </tr>`;
  });
  document.getElementById('tbody').innerHTML = html || '<tr><td colspan="8" style="text-align:center;color:#8b949e;padding:40px">No results match your filters</td></tr>';
  document.getElementById('updated').textContent = DATA._meta?.updated ? 'Updated: ' + DATA._meta.updated : '';
}

function resetFilters() {
  document.getElementById('filterCity').value = '';
  document.getElementById('filterService').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterSearch').value = '';
  render();
}

render();
</script>
</body>
</html>
