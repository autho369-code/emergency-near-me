<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CallNowService — Provider Database</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',system-ui,sans-serif;background:#fff;color:#000;line-height:1.5;padding:20px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .logo{font-size:18px;font-weight:700}.logo span{font-weight:400}.logo a{color:#000;text-decoration:none}
  .loading{text-align:center;padding:60px;color:#4b4b4b;font-size:14px}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .stat{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:10px 14px;text-align:center;min-width:80px}
  .stat .num{font-size:20px;font-weight:700}
  .stat .label{font-size:9px;color:#4b4b4b;text-transform:uppercase;margin-top:2px}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .filters select,.filters input{padding:6px 12px;border:1px solid #e5e5e5;border-radius:999px;font-size:12px;font-family:inherit;background:#fff}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{padding:8px;background:#f8f8f8;border-bottom:1px solid #e5e5e5;font-size:10px;text-transform:uppercase;color:#4b4b4b;text-align:left;position:sticky;top:0}
  td{padding:6px 8px;border-bottom:1px solid #f0f0f0}
  tr:hover td{background:#fafafa}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:700}
  .badge.searching{background:#efefef;color:#000}
  .badge.found{background:#fff3cd;color:#856404}
  .badge.contacted{background:#e2e2e2;color:#000}
  .badge.active{background:#d4edda;color:#155724}
  .badge.rejected{background:#f8d7da;color:#721c24}
  .signup-bar{background:#000;color:#fff;border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:12px;display:none}
  .signup-bar a{color:#fff;text-decoration:underline}
</style>
</head>
<body>

<header>
  <div class="logo"><a href="/">Call<span>Now</span>Service</a></div>
  <span style="font-size:12px;color:#4b4b4b" id="meta-info"></span>
</header>

<div id="loading" class="loading">Loading provider data...</div>

<div id="content" style="display:none">
  <div class="signup-bar" id="signup-bar">📥 <span id="signup-count">0</span> pending signups — <a href="#">review now</a></div>
  <div class="stats" id="stats"></div>
  <div class="filters">
    <select id="fState"><option value="">All States</option></select>
    <select id="fService"><option value="">All Services</option></select>
    <select id="fStatus"><option value="">All Status</option><option value="searching">Searching</option><option value="found">Found</option><option value="contacted">Contacted</option><option value="active">Active</option></select>
    <input type="text" id="fSearch" placeholder="Search provider..." style="min-width:140px">
  </div>
  <table><thead><tr><th>City</th><th>St</th><th>Service</th><th>Status</th><th>Provider</th><th>Phone</th><th>Leads</th><th>$/mo</th></tr></thead><tbody id="tbody"></tbody></table>
</div>

<script>
var DATA=[];
fetch('providers.json').then(r=>r.json()).then(d=>{
  for(var ck in d){if(ck.startsWith('_'))continue;var c=d[ck];
    for(var sk in c){if(sk.startsWith('_'))continue;var vendors=c[sk];if(!Array.isArray(vendors))continue;
      vendors.forEach(function(v,i){DATA.push({city:c._name||ck,state:c._state||'',service:sk,vendor:v,slot:i});});
    }
  }
  document.getElementById('loading').style.display='none';document.getElementById('content').style.display='block';
  if(d._meta)document.getElementById('meta-info').textContent='Updated: '+(d._meta.updated||'')+' | Slots: '+(d._meta.total_slots||0);
  initFilters();render();
}).catch(function(e){document.getElementById('loading').innerHTML='Error: '+e.message;});

function initFilters(){
  var states={},services={};DATA.forEach(function(r){states[r.state]=1;services[r.service]=1;});
  var sh='<option value="">All States</option>',sv='<option value="">All Services</option>';
  Object.keys(states).sort().forEach(function(s){sh+='<option>'+s+'</option>'});Object.keys(services).sort().forEach(function(s){sv+='<option>'+s+'</option>'});
  document.getElementById('fState').innerHTML=sh;document.getElementById('fService').innerHTML=sv;
  ['fState','fService','fStatus','fSearch'].forEach(function(id){document.getElementById(id).onchange=render;document.getElementById(id).oninput=render;});
  try{
    var signups=JSON.parse(localStorage.getItem('cns_signups')||'[]');var pending=signups.filter(function(s){return s.status==='pending'}).length;
    if(pending>0){document.getElementById('signup-bar').style.display='block';document.getElementById('signup-count').textContent=pending;}
  }catch(e){}
}

function render(){
  var sf=document.getElementById('fState').value,svf=document.getElementById('fService').value,stf=document.getElementById('fStatus').value,q=document.getElementById('fSearch').value.toLowerCase();
  var filtered=DATA.filter(function(r){if(sf&&r.state!==sf)return false;if(svf&&r.service!==svf)return false;if(stf&&r.vendor.status!==stf)return false;if(q&&r.vendor.provider_name&&!r.vendor.provider_name.toLowerCase().includes(q))return false;return true;});
  var st={};var tl=0,tr=0;filtered.forEach(function(r){st[r.vendor.status]=(st[r.vendor.status]||0)+1;tl+=r.vendor.leads_month||0;tr+=(r.vendor.leads_month||0)*(r.vendor.rate||0);});
  document.getElementById('stats').innerHTML='<div class="stat"><div class="num">'+(st.searching||0)+'</div><div class="label">Searching</div></div><div class="stat"><div class="num">'+(st.found||0)+'</div><div class="label">Found</div></div><div class="stat"><div class="num">'+(st.contacted||0)+'</div><div class="label">Contacted</div></div><div class="stat"><div class="num">'+(st.active||0)+'</div><div class="label">Active</div></div><div class="stat"><div class="num">'+tl+'</div><div class="label">Leads</div></div><div class="stat"><div class="num">$'+tr.toLocaleString()+'</div><div class="label">Revenue</div></div>';
  var h='',max=200;filtered.slice(0,max).forEach(function(r){var v=r.vendor;h+='<tr><td>'+r.city+'</td><td>'+r.state+'</td><td>'+r.service+'</td><td><span class="badge '+v.status+'">'+v.status+'</span></td><td>'+(v.provider_name||'—')+'</td><td>'+(v.provider_phone||'—')+'</td><td>'+(v.leads_month||0)+'</td><td>$'+((v.leads_month||0)*(v.rate||30))+'</td></tr>';});
  if(filtered.length>max)h+='<tr><td colspan="8">... '+(filtered.length-max)+' more (filter to refine)</td></tr>';
  document.getElementById('tbody').innerHTML=h||'<tr><td colspan="8" style="text-align:center;padding:30px;color:#4b4b4b">No results</td></tr>';
}
</script>
</body>
</html>
